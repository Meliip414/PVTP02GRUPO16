<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 18</title>
</head>
<body>
    <script>
        const calcularMayor = (numero1, numero2) => {
        if (numero1 > numero2) {
            document.write(`El número mayor es: ${numero1}`);
        } else if (numero2 > numero1) {
            document.write(`El número mayor es: ${numero2}`);
        } else {
            document.write("Ambos números son iguales");
        }
        };

        let numero1 = Number(prompt("Ingrese el primer número"));
        let numero2 = Number(prompt("Ingrese el segundo número"));
        calcularMayor(numero1, numero2);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>

    <main>
        <aside>
            
            <label>Seleccione un país: </label>
            <select id="pais">
                <option disabled selected value="">Elija el país...</option>
                <option value="Argentina">Argentina</option>
                <option value="Brasil">Brasil</option>

                <option value="Chile">Chile</option>

                <option value="Colombia">Colombia</option>
            </select>
            
            <label>Capital: </label>
            <select id="capital">
                <option disabled selected value="">Capital del país...</option>
                <option value="C.A.B.A.">C.A.B.A.</option>
                <option value="Brasilia">Brasilia</option>
                <option value="Ottawa">Ottawa</option>
                <option value="Santiago">Santiago</option>
                <option value="Lima">Lima</option>
                <option value="Bogotá">Bogotá</option>
            </select>

        <script src="../js/ejercicio21.js"></script>

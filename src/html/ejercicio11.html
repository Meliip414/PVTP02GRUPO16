<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculo de Consumo de Combustible x Kilometro</title>
</head>
<body>
   <script> 
let kilometros = prompt("Ingrese la cantidad de Kilometros recorridos por su vehiculo");
let combustible = prompt("Ingrese la cantidad de combustible consumido");
let consumo = combustible / kilometros;


document.write(`Al recorrer ${kilometros} km con ${combustible} litros de combustible, el consumo es de ${consumo} litros/km`);
   </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ejercicio17</title>
</head>
<body>
    <script>
        const contarLetraA = (palabra) =>{
            let a=0;
            const npalabra=palabra.length;
            for(let i=0; i<npalabra;i++){
                if(palabra[i]=="a"){
                    a++;
                }
            }
            alert(a);
        }
        const palabra=prompt("Ingrese una palabra: ");
        contarLetraA(palabra);
    </script>
    
</body>
</html>
